<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2E9DC">
<title>Remise en Forme - Isotropie</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Remise%20en%20Forme%22,%22short_name%22:%22Isotropie%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23F2E9DC%22,%22theme_color%22:%22%23F2E9DC%22,%22icons%22:[]}">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:#F2E9DC; font-family:system-ui,-apple-system,sans-serif; overflow-x:hidden; }
  body { user-select:none; -webkit-user-select:none; }
  button { font-family:inherit; cursor:pointer; }
  #app { min-height:100vh; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Donnees exercices (ordre de seance) ────────────────────────────────────────
var EX = [
  { name:"Isometrie des Mollets", zh:"\u63D0\u8E35", py:"ti zhong", em:"\uD83E\uDDB5",
    desc:"Debout, pieds joints, monte lentement sur la pointe des pieds le plus haut possible et tiens la position en serrant fort les mollets. Garde le buste droit et l'equilibre.",
    eff:"Renforce les muscles du mollet (gastrocnemien et soleaire), solidifie les chevilles et les tendons d'Achille, ameliore la stabilite et l'equilibre debout." },
  { name:"Posture du Cavalier", zh:"\u9A6C\u6B65", py:"ma bu", em:"\uD83D\uDC0E",
    desc:"Ecarte les pieds plus large que les epaules, pointes vers l'avant, puis descends comme pour t'asseoir sur un cheval en poussant les genoux vers l'exterieur. Dos droit, bassin engage.",
    eff:"Double travail : renforce les cuisses (quadriceps) et les fessiers, tout en etirant les adducteurs (interieur des cuisses). Excellent pour l'ancrage, la posture et la force des jambes." },
  { name:"La Chaise", zh:"\u9760\u5899\u9759\u8E72", py:"kao qiang jing dun", em:"\uD83E\uDE91",
    desc:"Dos plaque contre un mur, descends jusqu'a ce que tes cuisses soient paralleles au sol, genoux a 90 degres au-dessus des chevilles. Les bras restent libres, ne pose pas les mains sur les cuisses.",
    eff:"Travail intense des quadriceps, fessiers et mollets. Reconnu pour faire baisser la tension arterielle et renforcer l'endurance des jambes." },
  { name:"Gainage Table Inversee", zh:"\u53CD\u5411\u5E73\u677F\u652F\u6491", py:"fan xiang ping ban", em:"\uD83D\uDD01",
    desc:"Assis au sol, jambes tendues, mains posees derriere les hanches. Pousse le bassin vers le haut jusqu'a former une ligne droite des epaules aux chevilles, tete dans l'alignement. Serre fessiers et abdos.",
    eff:"Renforce toute la chaine arriere : fessiers, ischio-jambiers, bas du dos, plus les epaules et triceps. Ouvre la poitrine et corrige la posture." },
  { name:"Suspension Passive", zh:"\u60AC\u5782", py:"xuan chui", em:"\uD83C\uDFCB",
    desc:"Suspends-toi a une barre, bras tendus, mains ecartees largeur d'epaules. Laisse le corps pendre sans remonter les epaules vers les oreilles, garde-les actives et basses.",
    eff:"Renforce la prise (grip) et les avant-bras, decompresse la colonne vertebrale (baisse la pression sur les disques), ameliore la mobilite des epaules et soulage le dos." }
];
var REST_EX = 120;

// ── Niveaux (semaine 1/2/3) ──────────────────────────────────────────────────────
var LVL = [
  [{s:3,w:25,r:30},{s:4,w:45,r:30},{s:5,w:60,r:45}],
  [{s:3,w:30,r:60},{s:3,w:90,r:75},{s:3,w:180,r:90}],
  [{s:3,w:30,r:60},{s:4,w:50,r:60},{s:5,w:90,r:90}],
  [{s:3,w:15,r:45},{s:3,w:30,r:45},{s:3,w:50,r:30}],
  [{s:3,w:15,r:60},{s:4,w:35,r:60},{s:5,w:60,r:60}]
];

// ── Palette (fond beige chaud + tons C harmonises) ───────────────────────────────
var CLR = {
  work:    { m:"#1E5FA3", d:"#CBB99E", g:"rgba(30,95,163,0.25)" },   // cobalt
  restSet: { m:"#0A8A63", d:"#CBB99E", g:"rgba(10,138,99,0.25)" },   // jade
  restEx:  { m:"#6B4FB8", d:"#CBB99E", g:"rgba(107,79,184,0.25)" }   // violet
};
var BG   = "#F2E9DC";  // beige chaud leger
var SF   = "#FBF6EE";  // carte creme
var TX   = "#3A332A";  // brun fonce chaud (texte principal)
var DM   = "#8A7E6C";  // brun moyen doux (texte secondaire)
var SOFT = "#E4D7C3";  // beige plus fonce (separateurs / inactifs)
var ZH   = "#6B4FB8";  // violet pour le chinois (harmonise restEx)

// ── Audio ──────────────────────────────────────────────────────────────────────
var _ac=null;
function getCtx(){ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==="suspended")_ac.resume(); return _ac; }
function bip(freq,dur,vol){ try{ var ctx=getCtx(); var o=ctx.createOscillator(); var g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=freq; g.gain.setValueAtTime(vol,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur); o.start(); o.stop(ctx.currentTime+dur); }catch(e){} }
function chime(){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ bip(f,0.45,0.3); }, i*190); }); }
function vibe(p){ try{ if(navigator.vibrate)navigator.vibrate(p); }catch(e){} }

// ── Etat global ─────────────────────────────────────────────────────────────────
var S = { screen:"home", week:1, exIdx:0, setIdx:0, phase:"work", tl:0, paused:false, done:false };
var timer=null;
var app = document.getElementById("app");

// ── Horloge a aiguille (SVG) ─────────────────────────────────────────────────────
function clockSVG(tl, tot, phase){
  var c = CLR[phase]||CLR.work;
  var progress = tot>0 ? Math.max(0,Math.min(1,(tot-tl)/tot)) : 1;
  var angle = progress*360;
  function toXY(deg,r){ var a=(deg-90)*Math.PI/180; return [100+r*Math.cos(a),100+r*Math.sin(a)]; }
  var h = toXY(angle,74);
  var arcPath="";
  if(progress<=0){ arcPath="M100 16 A84 84 0 1 1 99.999 16"; }
  else if(progress<1){ var s=toXY(angle,84); var large=(1-progress)*360>180?1:0; arcPath="M"+s[0].toFixed(2)+" "+s[1].toFixed(2)+" A84 84 0 "+large+" 1 100 16"; }
  var mins=Math.floor(tl/60), secs=tl%60;
  var display = mins>0 ? mins+":"+String(secs).padStart(2,"0") : String(tl);
  var fs = mins>0 ? 22 : (tl>=100 ? 20 : 32);
  var ticks="";
  [0,90,180,270].forEach(function(a){ var p1=toXY(a,70), p2=toXY(a,80); ticks+='<line x1="'+p1[0].toFixed(1)+'" y1="'+p1[1].toFixed(1)+'" x2="'+p2[0].toFixed(1)+'" y2="'+p2[1].toFixed(1)+'" stroke="'+SOFT+'" stroke-width="2.5" stroke-linecap="round"/>'; });
  return '<svg viewBox="0 0 200 200" style="width:210px;height:210px;display:block;margin:0 auto;filter:drop-shadow(0 0 14px '+c.g+')">'
    + '<circle cx="100" cy="100" r="90" fill="'+SF+'"/>'
    + '<circle cx="100" cy="100" r="84" fill="none" stroke="'+c.d+'" stroke-width="5.5"/>'
    + ticks
    + (arcPath ? '<path d="'+arcPath+'" fill="none" stroke="'+c.m+'" stroke-width="6" stroke-linecap="round"/>' : '')
    + '<line x1="100" y1="100" x2="'+h[0].toFixed(2)+'" y2="'+h[1].toFixed(2)+'" stroke="'+c.m+'" stroke-width="3.5" stroke-linecap="round"/>'
    + '<circle cx="100" cy="100" r="6.5" fill="'+c.m+'"/>'
    + '<text x="100" y="107" text-anchor="middle" font-size="'+fs+'" font-weight="700" fill="'+c.m+'" font-family="Courier New,monospace">'+display+'</text>'
    + '</svg>';
}

// ── Ecran accueil ────────────────────────────────────────────────────────────────
function totalMin(){
  var t=(EX.length-1)*REST_EX;
  for(var i=0;i<EX.length;i++){ var l=LVL[i][S.week-1]; t+=l.s*l.w+(l.s-1)*l.r; }
  return Math.round(t/60);
}
function renderHome(){
  var labels=["Debutant","Intermediaire","Avance"];
  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:24px 16px;">'
    + '<div style="max-width:400px;margin:0 auto;">'
    + '<div style="text-align:center;margin-bottom:24px;">'
    + '<p style="font-size:11px;color:'+DM+';margin:0 0 6px;letter-spacing:0.18em;text-transform:uppercase;">Programme Isometrique</p>'
    + '<h1 style="font-size:27px;font-weight:700;margin:0;letter-spacing:-0.02em;color:'+TX+';">Remise en Forme</h1>'
    + '</div>'
    + '<div style="background:'+SF+';border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,51,42,0.06);">'
    + '<p style="font-size:11px;color:'+DM+';margin:0 0 10px;text-transform:uppercase;letter-spacing:0.1em;">Semaine</p>'
    + '<div style="display:flex;gap:8px;margin-bottom:10px;">';
  for(var w=1;w<=3;w++){
    var on=S.week===w;
    h+='<button onclick="setWeek('+w+')" style="flex:1;padding:13px 0;border-radius:12px;border:none;background:'+(on?CLR.work.m:SOFT)+';color:'+(on?"#fff":DM)+';font-size:14px;font-weight:'+(on?600:500)+';">Sem. '+w+'</button>';
  }
  h+='</div>'
    + '<p style="font-size:12px;color:'+DM+';margin:0;text-align:center;">'+labels[S.week-1]+' - environ <strong style="color:'+TX+';">'+totalMin()+' min</strong></p>'
    + '</div>'
    + '<div style="background:'+SF+';border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,51,42,0.06);">'
    + '<p style="font-size:11px;color:'+DM+';margin:0 0 10px;text-transform:uppercase;letter-spacing:0.1em;">Seance du jour</p>';
  for(var i=0;i<EX.length;i++){
    var l=LVL[i][S.week-1];
    h+='<div style="display:flex;align-items:center;gap:12px;padding:11px 0;'+(i<4?"border-bottom:1px solid "+SOFT+";":"")+'">'
      + '<span style="font-size:24px;width:32px;text-align:center;">'+EX[i].em+'</span>'
      + '<div style="flex:1;min-width:0;">'
      + '<p style="margin:0 0 2px;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:'+TX+';">'+EX[i].name+'</p>'
      + '<p style="margin:0 0 3px;font-size:17px;color:'+ZH+';font-weight:700;line-height:1.1;">'+EX[i].zh+'</p>'
      + '<p style="margin:0;font-size:12px;color:'+DM+';">'+l.s+' series x '+l.w+'s - repos '+l.r+'s</p>'
      + '</div>'
      + '<span style="font-size:11px;color:'+CLR.work.m+';font-weight:700;min-width:20px;">#'+(i+1)+'</span>'
      + '</div>';
  }
  h+='</div>'
    + '<button onclick="showGuide()" style="width:100%;padding:14px;border-radius:14px;border:1.5px solid '+CLR.work.m+';background:'+SF+';color:'+CLR.work.m+';font-size:14px;font-weight:600;margin-bottom:12px;">\uD83D\uDCD6  Guide des postures</button>'
    + '<button onclick="startSession()" style="width:100%;padding:17px;border-radius:16px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;letter-spacing:0.06em;box-shadow:0 6px 20px '+CLR.work.g+';">DEMARRER - Semaine '+S.week+'</button>'
    + '<div style="display:flex;gap:16px;justify-content:center;margin-top:18px;flex-wrap:wrap;">';
  var leg=[["Travail","work"],["Repos serie","restSet"],["Repos exercice","restEx"]];
  for(var k=0;k<leg.length;k++){
    h+='<div style="display:flex;align-items:center;gap:6px;"><div style="width:9px;height:9px;border-radius:50%;background:'+CLR[leg[k][1]].m+';"></div><span style="font-size:11px;color:'+DM+';">'+leg[k][0]+'</span></div>';
  }
  h+='</div></div></div>';
  app.innerHTML=h;
}

// ── Ecran guide (descriptions des postures) ──────────────────────────────────────
function renderGuide(){
  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:24px 16px;">'
    + '<div style="max-width:400px;margin:0 auto;">'
    + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">'
    + '<button onclick="goHome()" style="background:'+SF+';border:none;color:'+TX+';font-size:18px;width:40px;height:40px;border-radius:12px;box-shadow:0 2px 8px rgba(58,51,42,0.08);">\u2190</button>'
    + '<h1 style="font-size:21px;font-weight:700;margin:0;color:'+TX+';">Guide des postures</h1>'
    + '</div>';
  for(var i=0;i<EX.length;i++){
    var e=EX[i];
    h+='<div style="background:'+SF+';border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,51,42,0.06);">'
      + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">'
      + '<span style="font-size:34px;">'+e.em+'</span>'
      + '<div style="flex:1;">'
      + '<p style="margin:0;font-size:11px;color:'+CLR.work.m+';font-weight:700;">EXERCICE #'+(i+1)+'</p>'
      + '<h2 style="margin:1px 0 2px;font-size:17px;font-weight:600;color:'+TX+';">'+e.name+'</h2>'
      + '<p style="margin:0;font-size:19px;color:'+ZH+';font-weight:700;line-height:1.1;">'+e.zh+' <span style="font-size:12px;color:'+DM+';font-weight:400;font-style:italic;">'+e.py+'</span></p>'
      + '</div></div>'
      + '<div style="margin-bottom:10px;">'
      + '<p style="margin:0 0 3px;font-size:10px;color:'+DM+';text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Comment faire</p>'
      + '<p style="margin:0;font-size:13px;color:'+TX+';line-height:1.55;">'+e.desc+'</p>'
      + '</div>'
      + '<div>'
      + '<p style="margin:0 0 3px;font-size:10px;color:'+CLR.restSet.m+';text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Ce que ca fait</p>'
      + '<p style="margin:0;font-size:13px;color:'+TX+';line-height:1.55;">'+e.eff+'</p>'
      + '</div>'
      + '</div>';
  }
  h+='<button onclick="startSession()" style="width:100%;padding:16px;border-radius:14px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px '+CLR.work.g+';margin-top:4px;">DEMARRER LA SEANCE</button>'
    + '</div></div>';
  app.innerHTML=h;
}

// ── Ecran seance ─────────────────────────────────────────────────────────────────
function renderSession(){
  if(S.done){ renderDone(); return; }
  var l=LVL[S.exIdx][S.week-1];
  var tot = S.phase==="work" ? l.w : (S.phase==="restSet" ? l.r : REST_EX);
  var pc = CLR[S.phase]||CLR.work;
  var showIdx = (S.phase==="restEx" && S.exIdx+1<EX.length) ? S.exIdx+1 : S.exIdx;
  var showEx = EX[showIdx];
  var phLabel = S.phase==="work" ? "TRAVAIL" : (S.phase==="restSet" ? "REPOS - serie suivante" : "REPOS - exercice suivant");
  var isNext = (S.phase==="restEx" && S.exIdx+1<EX.length);

  var dots="";
  for(var i=0;i<EX.length;i++){
    var sz=i===S.exIdx?10:8;
    var bg=i<S.exIdx?CLR.work.m:(i===S.exIdx?pc.m:SOFT);
    dots+='<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+bg+';transition:all 0.3s;"></div>';
  }

  var bars="";
  for(var j=0;j<l.s;j++){
    var complete = j<S.setIdx || (j===S.setIdx && S.phase!=="work");
    var bg2 = complete?CLR.work.m:(j===S.setIdx?pc.m:SOFT);
    bars+='<div style="height:5px;flex:1;max-width:44px;border-radius:3px;background:'+bg2+';transition:background 0.4s;"></div>';
  }
  var setTxt = S.phase==="restEx" ? (l.s+" / "+l.s+" series terminees") : ("Serie "+(S.setIdx+1)+" / "+l.s);

  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:20px 16px;">'
    + '<div style="max-width:400px;margin:0 auto;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">'
    + '<button onclick="quitSession()" style="background:'+SF+';border:none;color:'+DM+';font-size:18px;width:38px;height:38px;border-radius:11px;line-height:1;box-shadow:0 2px 8px rgba(58,51,42,0.08);">\u2715</button>'
    + '<span style="font-size:11px;color:'+DM+';letter-spacing:0.12em;font-weight:600;">SEMAINE '+S.week+'</span>'
    + '<div style="display:flex;gap:6px;align-items:center;">'+dots+'</div>'
    + '</div>'
    + '<div style="text-align:center;margin-bottom:18px;">'
    + (isNext ? '<p style="font-size:11px;color:'+pc.m+';margin:0 0 6px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Prochain exercice</p>' : '')
    + '<div style="font-size:46px;line-height:1.1;margin-bottom:4px;">'+showEx.em+'</div>'
    + '<h2 style="margin:2px 0 2px;font-size:21px;font-weight:600;color:'+TX+';">'+showEx.name+'</h2>'
    + '<p style="margin:0;font-size:24px;color:'+ZH+';font-weight:700;line-height:1.1;">'+showEx.zh+'</p>'
    + '</div>'
    + '<div style="text-align:center;margin-bottom:18px;">'
    + '<div style="display:flex;gap:8px;justify-content:center;margin-bottom:6px;">'+bars+'</div>'
    + '<span style="font-size:12px;color:'+DM+';">'+setTxt+'</span>'
    + '</div>'
    + clockSVG(S.tl,tot,S.phase)
    + '<p style="text-align:center;margin:14px 0 18px;font-size:12px;font-weight:700;color:'+pc.m+';letter-spacing:0.14em;">'+phLabel+'</p>'
    + '<button onclick="togglePause()" style="width:100%;padding:15px;border-radius:14px;border:none;background:'+(S.paused?pc.m:SOFT)+';color:'+(S.paused?"#fff":DM)+';font-size:14px;font-weight:700;'+(S.paused?"box-shadow:0 4px 16px "+pc.g+";":"")+'">'+(S.paused?"\u25B6  Reprendre":"\u23F8  Pause")+'</button>'
    + '</div></div>';
  app.innerHTML=h;
}

function renderDone(){
  app.innerHTML='<div style="min-height:100vh;background:'+BG+';display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;">'
    + '<div>'
    + '<div style="font-size:72px;margin-bottom:16px;">\uD83C\uDF89</div>'
    + '<h2 style="color:'+TX+';margin:0 0 8px;font-size:26px;font-weight:700;">Seance terminee !</h2>'
    + '<p style="color:'+CLR.work.m+';margin:0 0 4px;font-weight:600;">Semaine '+S.week+' - Bravo !</p>'
    + '<p style="color:'+DM+';font-size:13px;margin:0 0 32px;">Hydrate-toi et prends 5 min pour t\'etirer.</p>'
    + '<button onclick="goHome()" style="padding:15px 44px;border-radius:14px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px '+CLR.work.g+';">Retour</button>'
    + '</div></div>';
}

// ── Logique timer ────────────────────────────────────────────────────────────────
function startTick(){
  clearInterval(timer);
  timer=setInterval(function(){
    if(S.paused) return;
    var next=S.tl-1;
    if(next>0 && next<=10) bip(next<=3?1100:880, 0.08, next<=3?0.4:0.28);
    if(next<=0){ S.tl=0; clearInterval(timer); advance(); }
    else { S.tl=next; renderSession(); }
  },1000);
}
function advance(){
  var l=LVL[S.exIdx][S.week-1];
  if(S.phase==="work"){
    if(S.setIdx<l.s-1){ go("restSet", S.exIdx, S.setIdx, l.r); }
    else if(S.exIdx<EX.length-1){ go("restEx", S.exIdx, S.setIdx, REST_EX); }
    else { chime(); vibe([300,100,300,100,500]); S.done=true; renderSession(); }
  } else if(S.phase==="restSet"){
    go("work", S.exIdx, S.setIdx+1, LVL[S.exIdx][S.week-1].w);
  } else if(S.phase==="restEx"){
    var ni=S.exIdx+1; go("work", ni, 0, LVL[ni][S.week-1].w);
  }
}
function go(phase, exIdx, setIdx, tl){
  S.phase=phase; S.exIdx=exIdx; S.setIdx=setIdx; S.tl=tl; S.paused=false;
  if(phase==="work"){ bip(880,0.18,0.42); vibe(80); }
  else if(phase==="restSet"){ bip(440,0.22,0.36); }
  else { bip(330,0.38,0.36); }
  renderSession();
  startTick();
}
function togglePause(){ S.paused=!S.paused; renderSession(); }
function quitSession(){ clearInterval(timer); goHome(); }

// ── Navigation ───────────────────────────────────────────────────────────────────
function setWeek(w){ S.week=w; renderHome(); }
function showGuide(){ clearInterval(timer); S.screen="guide"; renderGuide(); }
function startSession(){
  getCtx();
  S.screen="session"; S.exIdx=0; S.setIdx=0; S.phase="work"; S.tl=LVL[0][S.week-1].w; S.paused=false; S.done=false;
  renderSession();
  startTick();
}
function goHome(){ clearInterval(timer); S.screen="home"; S.done=false; renderHome(); }

renderHome();
</script>
</body>
</html>
