  { name:"Suspension Passive", zh:"\u60AC\u5782", py:"xuan chui", em:"\uD83C\uDFCB",

];

// ── Niveaux (semaine 1/2/3) ──────────────────────────────────────────────────────

// ── Palette (fond beige chaud + tons C harmonises) ───────────────────────────────
var CLR = {

  restSet: { m:"#0A8A63", d:"#CBB99E", g:"rgba(10,138,99,0.25)" },

// ── Audio ──────────────────────────────────────────────────────────────────────
var _ac=null;
function getCtx(){ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==="suspended")_ac.resume(); return _ac; }
// bip court (note qui s'eteint)
function bip(freq,dur,vol){ try{ var c=getCtx(); var o=c.createOscillator(); var g=c.createGain(); o.type="sine"; o.connect(g); g.connect(c.destination); o.frequency.value=freq; var t=c.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02); }catch(e){} }
// bip doux (attaque et extinction progressives)
function softBip(freq,start,dur,vol){ try{ var c=getCtx(); var o=c.createOscillator(); var g=c.createGain(); o.type="sine"; o.connect(g); g.connect(c.destination); o.frequency.value=freq; var t=c.currentTime+start; g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.04); g.gain.setValueAtTime(vol,t+dur-0.10); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02); }catch(e){} }
// biiip tenu chaud (fondamentale + octave grave pour arrondir)
function warmBeep(freq,start,dur,vol){ try{ var c=getCtx(); var t=c.currentTime+start; var o1=c.createOscillator(); var g1=c.createGain(); o1.type="sine"; o1.frequency.value=freq; o1.connect(g1); g1.connect(c.destination); g1.gain.setValueAtTime(0.0001,t); g1.gain.linearRampToValueAtTime(vol,t+0.06); g1.gain.setValueAtTime(vol,t+dur-0.12); g1.gain.exponentialRampToValueAtTime(0.0001,t+dur); o1.start(t); o1.stop(t+dur+0.02); var o2=c.createOscillator(); var g2=c.createGain(); o2.type="sine"; o2.frequency.value=freq/2; o2.connect(g2); g2.connect(c.destination); g2.gain.setValueAtTime(0.0001,t); g2.gain.linearRampToValueAtTime(vol*0.45,t+0.06); g2.gain.setValueAtTime(vol*0.45,t+dur-0.12); g2.gain.exponentialRampToValueAtTime(0.0001,t+dur); o2.start(t); o2.stop(t+dur+0.02); }catch(e){} }
// biiip tenu (volume constant) - pour le zero
function held(freq,dur,vol){ try{ var c=getCtx(); var o=c.createOscillator(); var g=c.createGain(); o.type="sine"; o.connect(g); g.connect(c.destination); o.frequency.value=freq; var t=c.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.02); g.gain.setValueAtTime(vol,t+dur-0.08); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.02); }catch(e){} }
// SON DE DEPART (uniquement au tout debut de seance) : bip ... bip ... biiiip 659Hz, dure 2.4s avant que le chrono parte
var START_DURATION = 2400; // ms : 0.5 + 0.5 + biiip qui se termine
function startSound(){ softBip(587,0,0.22,0.24); softBip(587,0.5,0.22,0.24); warmBeep(659,1.0,1.4,0.32); }
// note de fin de decompte (le 0) : biiip tenu 0.8s octave haute
function zeroSound(){ held(1047,0.8,0.4); }
// decompte 4->0 : octaves qui montent
var UP_NOTES = { 4:392, 3:523, 2:659, 1:784 };
function vibe(p){ try{ if(navigator.vibrate)navigator.vibrate(p); }catch(e){} }

// ── Etat global ─────────────────────────────────────────────────────────────────
var S = { screen:"home", week:1, exIdx:0, setIdx:0, phase:"work", tl:0, paused:false, done:false, running:false };
var timer=null;
var app = document.getElementById("app");

// ── Horloge a aiguille (SVG) ─────────────────────────────────────────────────────
function clockSVG(tl, tot, phase){
  var c = CLR[phase]||CLR.work;
  var progress = tot>0 ? Math.max(0,Math.min(1,(tot-tl)/tot)) : 1;
  var angle = progress*360;
  function toXY(deg,r){ var a=(deg-90)*Math.PI/180; return [100+r*Math.cos(a),100+r*Math.sin(a)]; }
  var h = toXY(angle,74);
  var arcPath="";
  if(progress<=0){ arcPath="M100 16 A84 84 0 1 1 99.999 16"; }
  else if(progress<1){ var s=toXY(angle,84); var large=(1-progress)*360>180?1:0; arcPath="M"+s[0].toFixed(2)+" "+s[1].toFixed(2)+" A84 84 0 "+large+" 1 100 16"; }
  var mins=Math.floor(tl/60), secs=tl%60;
  var display = mins>0 ? mins+":"+String(secs).padStart(2,"0") : String(tl);
  var fs = mins>0 ? 22 : (tl>=100 ? 20 : 32);
  var ticks="";
  [0,90,180,270].forEach(function(a){ var p1=toXY(a,70), p2=toXY(a,80); ticks+='<line x1="'+p1[0].toFixed(1)+'" y1="'+p1[1].toFixed(1)+'" x2="'+p2[0].toFixed(1)+'" y2="'+p2[1].toFixed(1)+'" stroke="'+SOFT+'" stroke-width="2.5" stroke-linecap="round"/>'; });
  return '<svg viewBox="0 0 200 200" style="width:210px;height:210px;display:block;margin:0 auto;filter:drop-shadow(0 0 14px '+c.g+')">'
    + '<circle cx="100" cy="100" r="90" fill="'+SF+'"/>'
    + '<circle cx="100" cy="100" r="84" fill="none" stroke="'+c.d+'" stroke-width="5.5"/>'
    + ticks
    + (arcPath ? '<path d="'+arcPath+'" fill="none" stroke="'+c.m+'" stroke-width="6" stroke-linecap="round"/>' : '')
    + '<line x1="100" y1="100" x2="'+h[0].toFixed(2)+'" y2="'+h[1].toFixed(2)+'" stroke="'+c.m+'" stroke-width="3.5" stroke-linecap="round"/>'
    + '<circle cx="100" cy="100" r="6.5" fill="'+c.m+'"/>'
    + '<text x="100" y="107" text-anchor="middle" font-size="'+fs+'" font-weight="700" fill="'+c.m+'" font-family="Courier New,monospace">'+display+'</text>'
    + '</svg>';
}

// ── Ecran accueil ────────────────────────────────────────────────────────────────
function totalMin(){
  var t=(EX.length-1)*REST_EX;
  for(var i=0;i<EX.length;i++){ var l=LVL[i][S.week-1]; t+=l.s*l.w+(l.s-1)*l.r; }
  return Math.round(t/60);
}

    + '</div>'
    + '<div style="background:'+SF+';border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,51,42,0.06);">'

    + '</div>'
    + '<div style="background:'+SF+';border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,51,42,0.06);">'

    h+='<div style="display:flex;align-items:center;gap:12px;padding:11px 0;'+(i<4?"border-bottom:1px solid "+SOFT+";":"")+'">'

      + '<p style="margin:0 0 3px;font-size:17px;color:'+ZH+';font-weight:700;line-height:1.1;">'+EX[i].zh+'</p>'
      + '<p style="margin:0;font-size:12px;color:'+DM+';">'+l.s+' séries x '+l.w+'s - repos '+l.r+'s</p>'
      + '</div>'
      + '<span style="font-size:11px;color:'+CLR.work.m+';font-weight:700;min-width:20px;">#'+(i+1)+'</span>'
      + '</div>';
  }
  h+='</div>'
    + '<button onclick="showGuide()" style="width:100%;padding:14px;border-radius:14px;border:1.5px solid '+CLR.work.m+';background:'+SF+';color:'+CLR.work.m+';font-size:14px;font-weight:600;margin-bottom:12px;">\uD83D\uDCD6  Guide des postures</button>'
    + '<button onclick="prepareSession()" style="width:100%;padding:17px;border-radius:16px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;letter-spacing:0.06em;box-shadow:0 6px 20px '+CLR.work.g+';">DÉMARRER - Semaine '+S.week+'</button>'
    + '<div style="display:flex;gap:16px;justify-content:center;margin-top:18px;flex-wrap:wrap;">';
  var leg=[["Travail","work"],["Repos série","restSet"],["Repos exercice","restEx"]];
  for(var k=0;k<leg.length;k++){
    h+='<div style="display:flex;align-items:center;gap:6px;"><div style="width:9px;height:9px;border-radius:50%;background:'+CLR[leg[k][1]].m+';"></div><span style="font-size:11px;color:'+DM+';">'+leg[k][0]+'</span></div>';
  }
  h+='</div></div></div>';

}

// ── Ecran guide ──────────────────────────────────────────────────────────────────
function renderGuide(){
  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:24px 16px;">'

    + '<h1 style="font-size:21px;font-weight:700;margin:0;color:'+TX+';">Guide des postures</h1>'
    + '</div>';
  for(var i=0;i<EX.length;i++){
    var e=EX[i];
    h+='<div style="background:'+SF+';border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,51,42,0.06);">'

      + '</div></div>'
      + '<div style="margin-bottom:10px;">'
      + '<p style="margin:0 0 3px;font-size:10px;color:'+DM+';text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Comment faire</p>'

    + '</div></div>';

    + '<button onclick="goHome()" style="width:100%;padding:13px;border-radius:14px;border:none;background:transparent;color:'+DM+';font-size:13px;font-weight:500;margin-top:10px;">Retour</button>'
    + '</div></div>';

}

// ── Ecran seance ─────────────────────────────────────────────────────────────────
function renderSession(){
  if(S.done){ renderDone(); return; }
  var l=LVL[S.exIdx][S.week-1];
  var tot = S.phase==="work" ? l.w : (S.phase==="restSet" ? l.r : REST_EX);
  var pc = CLR[S.phase]||CLR.work;
  var showIdx = (S.phase==="restEx" && S.exIdx+1<EX.length) ? S.exIdx+1 : S.exIdx;
  var showEx = EX[showIdx];
  var phLabel = S.phase==="work" ? "TRAVAIL" : "REPOS";
  var isNext = (S.phase==="restEx" && S.exIdx+1<EX.length);

  var dots="";
  for(var i=0;i<EX.length;i++){
    var sz=i===S.exIdx?10:8;
    var bg=i<S.exIdx?CLR.work.m:(i===S.exIdx?pc.m:SOFT);
    dots+='<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+bg+';transition:all 0.3s;"></div>';
  }

  var bars="";
  for(var j=0;j<l.s;j++){
    var complete = j<S.setIdx || (j===S.setIdx && S.phase!=="work");
    var bg2 = complete?CLR.work.m:(j===S.setIdx?pc.m:SOFT);
    bars+='<div style="height:5px;flex:1;max-width:44px;border-radius:3px;background:'+bg2+';transition:background 0.4s;"></div>';
  }
  var setTxt = S.phase==="restEx" ? (l.s+" / "+l.s+" séries terminées") : ("Série "+(S.setIdx+1)+" / "+l.s);

  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:20px 16px;">'
    + '<div style="max-width:400px;margin:0 auto;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">'
    + '<button onclick="quitSession()" style="background:'+SF+';border:none;color:'+DM+';font-size:12px;font-weight:600;padding:0 14px;height:34px;border-radius:11px;line-height:1;box-shadow:0 2px 8px rgba(58,51,42,0.08);">Accueil</button>'
    + '<span style="font-size:11px;color:'+DM+';letter-spacing:0.12em;font-weight:600;">SEMAINE '+S.week+'</span>'
    + '<div style="display:flex;gap:6px;align-items:center;">'+dots+'</div>'
    + '</div>'
    + '<div style="text-align:center;margin-bottom:18px;">'
    + (isNext ? '<p style="font-size:11px;color:'+pc.m+';margin:0 0 6px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Prochain exercice</p>' : '')
    + '<div style="font-size:46px;line-height:1.1;margin-bottom:4px;">'+showEx.em+'</div>'
    + '<h2 style="margin:2px 0 2px;font-size:21px;font-weight:600;color:'+TX+';">'+showEx.name+'</h2>'
    + '<p style="margin:0;font-size:24px;color:'+ZH+';font-weight:700;line-height:1.1;">'+showEx.zh+'</p>'
    + '</div>'
    + '<div style="text-align:center;margin-bottom:18px;">'
    + '<div style="display:flex;gap:8px;justify-content:center;margin-bottom:6px;">'+bars+'</div>'
    + '<span style="font-size:15px;font-weight:600;color:'+pc.m+';">'+setTxt+'</span>'
    + '</div>'
    + clockSVG(S.tl,tot,S.phase)
    + '<p style="text-align:center;margin:14px 0 18px;font-size:12px;font-weight:700;color:'+pc.m+';letter-spacing:0.14em;">'+phLabel+'</p>'
    + '<button onclick="togglePause()" style="width:100%;padding:15px;border-radius:14px;border:none;background:'+(S.paused?pc.m:SOFT)+';color:'+(S.paused?"#fff":DM)+';font-size:14px;font-weight:700;'+(S.paused?"box-shadow:0 4px 16px "+pc.g+";":"")+'">'+(S.paused?"\u25B6  Reprendre":"\u23F8  Pause")+'</button>'
    + '</div></div>';
  app.innerHTML=h;
}

function renderDone(){
  app.innerHTML='<div style="min-height:100vh;background:'+BG+';display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;">'
    + '<div>'
    + '<div style="font-size:72px;margin-bottom:16px;">\uD83C\uDF89</div>'
    + '<h2 style="color:'+TX+';margin:0 0 8px;font-size:26px;font-weight:700;">Séance terminee !</h2>'
    + '<p style="color:'+CLR.work.m+';margin:0 0 4px;font-weight:600;">Semaine '+S.week+' - Bravo !</p>'
    + '<p style="color:'+DM+';font-size:13px;margin:0 0 32px;">Hydrate-toi et prends 5 min pour t\'etirer.</p>'
    + '<button onclick="goHome()" style="padding:15px 44px;border-radius:14px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px '+CLR.work.g+';">Retour</button>'
    + '</div></div>';
}

// ── Logique timer ────────────────────────────────────────────────────────────────
function startTick(){
  clearInterval(timer);
  timer=setInterval(function(){
    if(S.paused) return;
    var next=S.tl-1;
    if(next>=5 && next<=10){ bip(880,0.10,0.28); }
    else if(next>=1 && next<=4){ bip(UP_NOTES[next],0.16,0.32); }
    if(next<=0){ S.tl=0; zeroSound(); clearInterval(timer); advance(); }
    else { S.tl=next; renderSession(); }
  },1000);
}
function advance(){
  var l=LVL[S.exIdx][S.week-1];
  if(S.phase==="work"){
    if(S.setIdx<l.s-1){ go("restSet", S.exIdx, S.setIdx, l.r); }
    else if(S.exIdx<EX.length-1){ go("restEx", S.exIdx, S.setIdx, REST_EX); }
    else { setTimeout(function(){ vibe([300,100,300,100,500]); }, 900); S.done=true; renderSession(); }
  } else if(S.phase==="restSet"){
    go("work", S.exIdx, S.setIdx+1, LVL[S.exIdx][S.week-1].w);
  } else if(S.phase==="restEx"){
    var ni=S.exIdx+1; go("work", ni, 0, LVL[ni][S.week-1].w);
  }
}
function go(phase, exIdx, setIdx, tl){
  S.phase=phase; S.exIdx=exIdx; S.setIdx=setIdx; S.tl=tl; S.paused=false;
  vibe(80);
  renderSession();
  startTick();
}
function togglePause(){ S.paused=!S.paused; renderSession(); }
function quitSession(){ clearInterval(timer); S.running=false; goHome(); }

// ── Navigation ───────────────────────────────────────────────────────────────────
function setWeek(w){ S.week=w; renderHome(); }
function showGuide(){ clearInterval(timer); S.screen="guide"; renderGuide(); }
// prepare : ecran pret, le timer ne demarre PAS encore
function prepareSession(){
  getCtx();
  clearInterval(timer);
  S.screen="ready"; S.exIdx=0; S.setIdx=0; S.phase="work"; S.tl=LVL[0][S.week-1].w; S.paused=false; S.done=false; S.running=false;
  renderReady();
}
// begin : c'est ici que TOI tu lances le timer
function beginSession(){
  getCtx();
  S.screen="session"; S.running=true;
  S.phase="work"; S.tl=LVL[0][S.week-1].w; S.paused=false;
  startSound();
  renderSession();
  // le chrono demarre seulement a la fin du biiiip
  setTimeout(function(){ vibe(80); startTick(); }, START_DURATION);
}
function goHome(){ clearInterval(timer); S.screen="home"; S.done=false; S.running=false; renderHome(); }

renderHome();
</script>
