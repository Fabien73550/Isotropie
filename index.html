<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0E18">
<title>Remise en Forme - Isotropie</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Remise%20en%20Forme%22,%22short_name%22:%22Isotropie%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230B0E18%22,%22theme_color%22:%22%230B0E18%22,%22icons%22:[]}">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:#0B0E18; font-family:system-ui,-apple-system,sans-serif; overflow-x:hidden; }
  body { user-select:none; -webkit-user-select:none; }
  button { font-family:inherit; cursor:pointer; }
  #app { min-height:100vh; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Donnees exercices (ordre de seance) ────────────────────────────────────────
var EX = [
  { name:"Isometrie des Mollets", em:"\uD83E\uDDB5",
    tip:"Pointe des pieds au max - contracter les mollets au maximum",
    lvl:[{s:3,w:25,r:30},{s:4,w:45,r:30},{s:5,w:60,r:45}] },
  { name:"Posture du Cavalier", em:"\uD83D\uDC0E",
    tip:"Genoux dans l'axe des pieds - dos bien droit",
    lvl:[{s:3,w:30,r:60},{s:3,w:90,r:75},{s:3,w:180,r:90}] },
  { name:"La Chaise", em:"\uD83E\uDE91",
    tip:"Cuisses paralleles au sol - bras libres, dos au mur",
    lvl:[{s:3,w:30,r:60},{s:4,w:50,r:60},{s:5,w:90,r:90}] },
  { name:"Gainage Table Inversee", em:"\uD83D\uDD01",
    tip:"Ligne epaules-chevilles - contracter fessiers et abdos",
    lvl:[{s:3,w:15,r:45},{s:3,w:30,r:45},{s:3,w:50,r:30}] },
  { name:"Suspension Passive", em:"\uD83C\uDFCB",
    tip:"Bras tendus - epaules basses - corps dans l'alignement",
    lvl:[{s:3,w:15,r:60},{s:4,w:35,r:60},{s:5,w:60,r:60}] }
];
var REST_EX = 120;

// ── Palette C (Cobalt & Jade) ──────────────────────────────────────────────────
var CLR = {
  work:    { m:"#1A6FC4", d:"#0A2040", g:"rgba(26,111,196,0.4)" },
  restSet: { m:"#0D9E72", d:"#042B20", g:"rgba(13,158,114,0.4)" },
  restEx:  { m:"#6C4FD4", d:"#1A0E40", g:"rgba(108,79,212,0.4)" }
};
var BG="#0B0E18", SF="#111827", TX="#E8E6F0", DM="#5B6478", DARK="#1C2636";

// ── Audio ──────────────────────────────────────────────────────────────────────
var _ac=null;
function getCtx(){ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); if(_ac.state==="suspended")_ac.resume(); return _ac; }
function bip(freq,dur,vol){ try{ var ctx=getCtx(); var o=ctx.createOscillator(); var g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=freq; g.gain.setValueAtTime(vol,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur); o.start(); o.stop(ctx.currentTime+dur); }catch(e){} }
function chime(){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ bip(f,0.45,0.3); }, i*190); }); }
function vibe(p){ try{ if(navigator.vibrate)navigator.vibrate(p); }catch(e){} }

// ── Etat global ─────────────────────────────────────────────────────────────────
var S = { screen:"home", week:1, exIdx:0, setIdx:0, phase:"work", tl:0, paused:false, done:false };
var timer=null;
var app = document.getElementById("app");

function gl(ei){ return EX[ei].lvl[S.week-1]; }

// ── Horloge a aiguille (SVG) ─────────────────────────────────────────────────────
function clockSVG(tl, tot, phase){
  var c = CLR[phase]||CLR.work;
  var progress = tot>0 ? Math.max(0,Math.min(1,(tot-tl)/tot)) : 1;
  var angle = progress*360;
  function toXY(deg,r){ var a=(deg-90)*Math.PI/180; return [100+r*Math.cos(a),100+r*Math.sin(a)]; }
  var h = toXY(angle,74);
  var arcPath="";
  if(progress<=0){ arcPath="M100 16 A84 84 0 1 1 99.999 16"; }
  else if(progress<1){ var s=toXY(angle,84); var large=(1-progress)*360>180?1:0; arcPath="M"+s[0].toFixed(2)+" "+s[1].toFixed(2)+" A84 84 0 "+large+" 1 100 16"; }
  var mins=Math.floor(tl/60), secs=tl%60;
  var display = mins>0 ? mins+":"+String(secs).padStart(2,"0") : String(tl);
  var fs = mins>0 ? 22 : (tl>=100 ? 20 : 32);
  var ticks="";
  [0,90,180,270].forEach(function(a){ var p1=toXY(a,70), p2=toXY(a,80); ticks+='<line x1="'+p1[0].toFixed(1)+'" y1="'+p1[1].toFixed(1)+'" x2="'+p2[0].toFixed(1)+'" y2="'+p2[1].toFixed(1)+'" stroke="#252D3F" stroke-width="2.5" stroke-linecap="round"/>'; });
  return '<svg viewBox="0 0 200 200" style="width:210px;height:210px;display:block;margin:0 auto;filter:drop-shadow(0 0 18px '+c.g+')">'
    + '<circle cx="100" cy="100" r="90" fill="'+BG+'"/>'
    + '<circle cx="100" cy="100" r="84" fill="none" stroke="'+c.d+'" stroke-width="5.5"/>'
    + ticks
    + (arcPath ? '<path d="'+arcPath+'" fill="none" stroke="'+c.m+'" stroke-width="6" stroke-linecap="round"/>' : '')
    + '<line x1="100" y1="100" x2="'+h[0].toFixed(2)+'" y2="'+h[1].toFixed(2)+'" stroke="'+c.m+'" stroke-width="3.5" stroke-linecap="round"/>'
    + '<circle cx="100" cy="100" r="6.5" fill="'+c.m+'"/>'
    + '<text x="100" y="107" text-anchor="middle" font-size="'+fs+'" font-weight="600" fill="'+c.m+'" font-family="Courier New,monospace">'+display+'</text>'
    + '</svg>';
}

// ── Ecran accueil ────────────────────────────────────────────────────────────────
function totalMin(){
  var t=(EX.length-1)*REST_EX;
  for(var i=0;i<EX.length;i++){ var l=EX[i].lvl[S.week-1]; t+=l.s*l.w+(l.s-1)*l.r; }
  return Math.round(t/60);
}
function renderHome(){
  var labels=["Debutant","Intermediaire","Avance"];
  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:24px 16px;">'
    + '<div style="max-width:400px;margin:0 auto;">'
    + '<div style="text-align:center;margin-bottom:24px;">'
    + '<p style="font-size:11px;color:'+DM+';margin:0 0 6px;letter-spacing:0.18em;text-transform:uppercase;">Programme Isometrique</p>'
    + '<h1 style="font-size:26px;font-weight:700;margin:0;letter-spacing:-0.02em;">Remise en Forme</h1>'
    + '</div>'
    + '<div style="background:'+SF+';border-radius:18px;padding:20px;margin-bottom:14px;">'
    + '<p style="font-size:11px;color:'+DM+';margin:0 0 10px;text-transform:uppercase;letter-spacing:0.1em;">Semaine</p>'
    + '<div style="display:flex;gap:8px;margin-bottom:10px;">';
  for(var w=1;w<=3;w++){
    var on=S.week===w;
    h+='<button onclick="setWeek('+w+')" style="flex:1;padding:13px 0;border-radius:12px;border:none;background:'+(on?CLR.work.m:DARK)+';color:'+(on?"#fff":DM)+';font-size:14px;font-weight:'+(on?600:400)+';">Sem. '+w+'</button>';
  }
  h+='</div>'
    + '<p style="font-size:12px;color:'+DM+';margin:0;text-align:center;">'+labels[S.week-1]+' - environ <strong style="color:'+TX+';">'+totalMin()+' min</strong></p>'
    + '</div>'
    + '<div style="background:'+SF+';border-radius:18px;padding:20px;margin-bottom:16px;">'
    + '<p style="font-size:11px;color:'+DM+';margin:0 0 10px;text-transform:uppercase;letter-spacing:0.1em;">Seance du jour</p>';
  for(var i=0;i<EX.length;i++){
    var l=EX[i].lvl[S.week-1];
    h+='<div style="display:flex;align-items:center;gap:12px;padding:11px 0;'+(i<4?"border-bottom:1px solid "+DARK+";":"")+'">'
      + '<span style="font-size:24px;width:32px;text-align:center;">'+EX[i].em+'</span>'
      + '<div style="flex:1;min-width:0;">'
      + '<p style="margin:0 0 2px;font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+EX[i].name+'</p>'
      + '<p style="margin:0;font-size:12px;color:'+DM+';">'+l.s+' series x '+l.w+'s - repos '+l.r+'s</p>'
      + '</div>'
      + '<span style="font-size:11px;color:'+CLR.work.m+';font-weight:600;min-width:20px;">#'+(i+1)+'</span>'
      + '</div>';
  }
  h+='</div>'
    + '<button onclick="startSession()" style="width:100%;padding:17px;border-radius:16px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;letter-spacing:0.06em;box-shadow:0 6px 24px '+CLR.work.g+';">DEMARRER - Semaine '+S.week+'</button>'
    + '<div style="display:flex;gap:16px;justify-content:center;margin-top:18px;flex-wrap:wrap;">';
  var leg=[["Travail","work"],["Repos serie","restSet"],["Repos exercice","restEx"]];
  for(var k=0;k<leg.length;k++){
    h+='<div style="display:flex;align-items:center;gap:6px;"><div style="width:9px;height:9px;border-radius:50%;background:'+CLR[leg[k][1]].m+';"></div><span style="font-size:11px;color:'+DM+';">'+leg[k][0]+'</span></div>';
  }
  h+='</div></div></div>';
  app.innerHTML=h;
}

// ── Ecran seance ─────────────────────────────────────────────────────────────────
function renderSession(){
  if(S.done){ renderDone(); return; }
  var l=gl(S.exIdx);
  var tot = S.phase==="work" ? l.w : (S.phase==="restSet" ? l.r : REST_EX);
  var pc = CLR[S.phase]||CLR.work;
  var showEx = (S.phase==="restEx" && S.exIdx+1<EX.length) ? EX[S.exIdx+1] : EX[S.exIdx];
  var phLabel = S.phase==="work" ? "TRAVAIL" : (S.phase==="restSet" ? "REPOS - serie suivante" : "REPOS - exercice suivant");
  var nextName = (S.phase==="restEx" && S.exIdx+1<EX.length) ? EX[S.exIdx+1].name : null;

  var dots="";
  for(var i=0;i<EX.length;i++){
    var sz=i===S.exIdx?10:8;
    var bg=i<S.exIdx?CLR.work.m:(i===S.exIdx?pc.m:DARK);
    dots+='<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+bg+';transition:all 0.3s;"></div>';
  }

  var bars="";
  for(var j=0;j<l.s;j++){
    var complete = j<S.setIdx || (j===S.setIdx && S.phase!=="work");
    var bg2 = complete?CLR.work.m:(j===S.setIdx?pc.m:DARK);
    bars+='<div style="height:5px;flex:1;max-width:44px;border-radius:3px;background:'+bg2+';transition:background 0.4s;"></div>';
  }
  var setTxt = S.phase==="restEx" ? (l.s+" / "+l.s+" series terminees") : ("Serie "+(S.setIdx+1)+" / "+l.s);

  var h='<div style="min-height:100vh;background:'+BG+';color:'+TX+';padding:20px 16px;">'
    + '<div style="max-width:400px;margin:0 auto;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">'
    + '<button onclick="quitSession()" style="background:none;border:none;color:'+DM+';font-size:22px;line-height:1;padding:4px;">\u2715</button>'
    + '<span style="font-size:11px;color:'+DM+';letter-spacing:0.12em;">SEMAINE '+S.week+'</span>'
    + '<div style="display:flex;gap:6px;align-items:center;">'+dots+'</div>'
    + '</div>'
    + '<div style="text-align:center;margin-bottom:14px;min-height:90px;">'
    + (S.phase==="restEx" && nextName ? '<p style="font-size:11px;color:'+pc.m+';margin:0 0 4px;text-transform:uppercase;letter-spacing:0.1em;">Prochain exercice</p>' : '')
    + '<div style="font-size:40px;line-height:1.2;">'+showEx.em+'</div>'
    + '<h2 style="margin:6px 0 4px;font-size:18px;font-weight:600;">'+showEx.name+'</h2>'
    + '<p style="margin:0;font-size:12px;color:'+DM+';line-height:1.4;">'+showEx.tip+'</p>'
    + '</div>'
    + '<div style="text-align:center;margin-bottom:16px;">'
    + '<div style="display:flex;gap:8px;justify-content:center;margin-bottom:6px;">'+bars+'</div>'
    + '<span style="font-size:12px;color:'+DM+';">'+setTxt+'</span>'
    + '</div>'
    + clockSVG(S.tl,tot,S.phase)
    + '<p style="text-align:center;margin:12px 0 16px;font-size:11px;font-weight:700;color:'+pc.m+';letter-spacing:0.14em;">'+phLabel+'</p>'
    + '<div style="display:flex;gap:10px;">'
    + '<button onclick="skip()" style="flex:1;padding:14px;border-radius:14px;border:none;background:'+DARK+';color:'+DM+';font-size:12px;font-weight:500;">\u23ED Passer</button>'
    + '<button onclick="togglePause()" style="flex:2;padding:14px;border-radius:14px;border:none;background:'+(S.paused?pc.m:DARK)+';color:'+(S.paused?"#fff":DM)+';font-size:14px;font-weight:700;'+(S.paused?"box-shadow:0 4px 16px "+pc.g+";":"")+'">'+(S.paused?"\u25B6  Reprendre":"\u23F8  Pause")+'</button>'
    + '</div>'
    + '</div></div>';
  app.innerHTML=h;
}

function renderDone(){
  app.innerHTML='<div style="min-height:100vh;background:'+BG+';display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;">'
    + '<div>'
    + '<div style="font-size:72px;margin-bottom:16px;">\uD83C\uDF89</div>'
    + '<h2 style="color:'+TX+';margin:0 0 8px;font-size:26px;font-weight:700;">Seance terminee !</h2>'
    + '<p style="color:'+CLR.work.m+';margin:0 0 4px;font-weight:600;">Semaine '+S.week+' - Bravo !</p>'
    + '<p style="color:'+DM+';font-size:13px;margin:0 0 32px;">Hydrate-toi et prends 5 min pour t\'etirer.</p>'
    + '<button onclick="goHome()" style="padding:15px 44px;border-radius:14px;border:none;background:'+CLR.work.m+';color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px '+CLR.work.g+';">Retour</button>'
    + '</div></div>';
}

// ── Logique timer ────────────────────────────────────────────────────────────────
function startTick(){
  clearInterval(timer);
  timer=setInterval(function(){
    if(S.paused) return;
    var next=S.tl-1;
    if(next>0 && next<=10) bip(next<=3?1100:880, 0.08, next<=3?0.4:0.28);
    if(next<=0){ S.tl=0; clearInterval(timer); advance(); }
    else { S.tl=next; renderSession(); }
  },1000);
}
function advance(){
  var l=gl(S.exIdx);
  if(S.phase==="work"){
    if(S.setIdx<l.s-1){ go("restSet", S.exIdx, S.setIdx, l.r); }
    else if(S.exIdx<EX.length-1){ go("restEx", S.exIdx, S.setIdx, REST_EX); }
    else { chime(); vibe([300,100,300,100,500]); S.done=true; renderSession(); }
  } else if(S.phase==="restSet"){
    go("work", S.exIdx, S.setIdx+1, gl(S.exIdx).w);
  } else if(S.phase==="restEx"){
    var ni=S.exIdx+1; go("work", ni, 0, gl(ni).w);
  }
}
function go(phase, exIdx, setIdx, tl){
  S.phase=phase; S.exIdx=exIdx; S.setIdx=setIdx; S.tl=tl; S.paused=false;
  if(phase==="work"){ bip(880,0.18,0.42); vibe(80); }
  else if(phase==="restSet"){ bip(440,0.22,0.36); }
  else { bip(330,0.38,0.36); }
  renderSession();
  startTick();
}
function skip(){ clearInterval(timer); advance(); }
function togglePause(){ S.paused=!S.paused; renderSession(); }
function quitSession(){ clearInterval(timer); goHome(); }

// ── Navigation ───────────────────────────────────────────────────────────────────
function setWeek(w){ S.week=w; renderHome(); }
function startSession(){
  getCtx(); // debloque l'audio au premier appui
  S.screen="session"; S.exIdx=0; S.setIdx=0; S.phase="work"; S.tl=gl(0).w; S.paused=false; S.done=false;
  renderSession();
  startTick();
}
function goHome(){ clearInterval(timer); S.screen="home"; S.done=false; renderHome(); }

// init
renderHome();
</script>
</body>
</html>
